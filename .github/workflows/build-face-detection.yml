name: Build FaceDetection Framework / XCFramework

on:
  workflow_dispatch:
    inputs:
      build_xcframework:
        description: "Also build simulator slice and create FaceDetection.xcframework"
        required: false
        default: "true"

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build FaceDetection.framework (+ optional .xcframework)
        shell: bash
        run: |
          set -euo pipefail

          BUILD_DIR="${GITHUB_WORKSPACE}/build"
          # 使用仓库内的实际工程（避免选错上层/下层 xcodeproj 导致 scheme/target 不匹配）
          PROJECT="${GITHUB_WORKSPACE}/FaceMonitorPlugin/FaceMonitorPlugin.xcodeproj"
          TARGET="FaceMonitorPlugin"

          rm -rf "${BUILD_DIR}"
          mkdir -p "${BUILD_DIR}"

          echo "=== Build device (iphoneos) ==="
          xcodebuild \
            -project "${PROJECT}" \
            -configuration Release \
            -sdk iphoneos \
            -target "${TARGET}" \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            build

          # 从构建设置中读取输出目录，避免依赖 derivedDataPath（runner 上不一定有 rg）
          IOS_BUILT_PRODUCTS_DIR="$(xcodebuild -project "${PROJECT}" -target "${TARGET}" -configuration Release -sdk iphoneos -showBuildSettings | awk -F= '/BUILT_PRODUCTS_DIR/ {gsub(/^[ \t]+|[ \t]+$/, "", $2); print $2; exit}')"
          if [ -z "${IOS_BUILT_PRODUCTS_DIR}" ]; then
            echo "Failed to parse BUILT_PRODUCTS_DIR for iphoneos"
            exit 1
          fi
          IOS_FRAMEWORK_SRC="${IOS_BUILT_PRODUCTS_DIR}/FaceMonitorPlugin.framework"
          echo "=== Prepare FaceDetection.framework (for UniApp) ==="
          ditto "${IOS_FRAMEWORK_SRC}" "${BUILD_DIR}/FaceDetection.framework"

          if [ "${{ inputs.build_xcframework }}" = "true" ]; then
            echo "=== Build simulator (iphonesimulator) ==="
            xcodebuild \
              -project "${PROJECT}" \
              -configuration Release \
              -sdk iphonesimulator \
              -target "${TARGET}" \
              BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
              ONLY_ACTIVE_ARCH=NO \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              build

            SIM_BUILT_PRODUCTS_DIR="$(xcodebuild -project "${PROJECT}" -target "${TARGET}" -configuration Release -sdk iphonesimulator -showBuildSettings | awk -F= '/BUILT_PRODUCTS_DIR/ {gsub(/^[ \t]+|[ \t]+$/, "", $2); print $2; exit}')"
            if [ -z "${SIM_BUILT_PRODUCTS_DIR}" ]; then
              echo "Failed to parse BUILT_PRODUCTS_DIR for iphonesimulator"
              exit 1
            fi
            SIM_FRAMEWORK_SRC="${SIM_BUILT_PRODUCTS_DIR}/FaceMonitorPlugin.framework"

            echo "=== Create FaceDetection.xcframework ==="
            # 注意：xcframework 的框架内部实际来自 FaceMonitorPlugin.framework，但最终输出命名为 FaceDetection.xcframework
            ditto "${IOS_FRAMEWORK_SRC}" "${BUILD_DIR}/FaceDetection-ios.framework"
            ditto "${SIM_FRAMEWORK_SRC}" "${BUILD_DIR}/FaceDetection-sim.framework"

            xcodebuild -create-xcframework \
              -framework "${BUILD_DIR}/FaceDetection-ios.framework" \
              -framework "${BUILD_DIR}/FaceDetection-sim.framework" \
              -output "${BUILD_DIR}/FaceDetection.xcframework"
          else
            echo "Skip xcframework creation (build_xcframework=false)"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FaceDetection-artifacts
          path: |
            build/FaceDetection.framework

      - name: Upload xcframework artifact
        if: ${{ inputs.build_xcframework == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: FaceDetection-xcframework
          path: build/FaceDetection.xcframework

